  
      <header class="flex items-center justify-end py-4 mb-2">

  <div class="flex items-center gap-3">

        <!-- Notification Bell -->
        <button
          aria-label="Notifications"
          class="relative w-9 h-9 flex items-center justify-center rounded-full bg-white shadow-sm text-[#701366] hover:text-white hover:bg-[#701366] transition-all duration-150 hover:scale-105"
        >
          <i data-lucide="bell" class="w-5 h-5"></i>
          <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
        </button>

        <!-- Settings -->
        <button
          aria-label="Settings"
          class="w-9 h-9 flex items-center justify-center rounded-full bg-white shadow-sm text-[#701366] hover:bg-[#701366] hover:text-white transition-all duration-150 hover:scale-105"
        >
          <i data-lucide="settings" class="w-5 h-5"></i>
        </button>

      </div>
      </header>
